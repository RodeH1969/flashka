<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashka</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script defer src="/js/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Flashka</h1>
        <p class="instructions">Find the 10 matching images with the least card flips possible</p>
        <div class="status">
            <p class="attempts-had">Attempts Had: <span class="number" id="attempts">0</span></p>
            <p class="attempts-left">Attempts Left: <span class="number" id="attempts-left">29</span></p>
        </div>
        <div class="game-board" id="game-board"></div>
        <div class="result" id="result" style="display: none;">
            <p id="result-message"></p>
            <p id="times-played"></p>
            <div id="game-over-box" class="game-over-box"></div>
            <button id="share-btn">Submit entry if <19</button>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>
</body>
</html>
